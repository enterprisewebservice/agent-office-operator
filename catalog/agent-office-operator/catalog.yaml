---
# File-Based Catalog (FBC) declarative config for the Agent Office Operator.
#
# Regenerate with `make catalog-fbc` after `make bundle`. The bundle
# block below is rendered by `opm render bundle/` so all CSV / CRD
# content is inlined as olm.bundle.object properties — that's what
# package-server needs to extract channel/displayName/etc. without
# pulling the bundle image at list time.

schema: olm.package
name: agent-office-operator
defaultChannel: alpha
description: |
  OLM-managed operator for the Governed Agent Platform on OpenShift. Owns
  the AgentWorkstation and MemoryModule CRDs and ships a ConsolePlugin
  that adds Memory Module / Agent Workstation tabs to the operator CSV
  detail page in OpenShift Console.

---
schema: olm.channel
package: agent-office-operator
name: alpha
entries:
