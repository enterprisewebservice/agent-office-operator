error_log /dev/stderr;
pid /tmp/nginx.pid;
worker_processes auto;
events {
  worker_connections 1024;
}
http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_body_temp_path /tmp/client_body;
  fastcgi_temp_path /tmp/fastcgi;
  proxy_temp_path /tmp/proxy;
  scgi_temp_path /tmp/scgi;
  uwsgi_temp_path /tmp/uwsgi;
  access_log /dev/stdout;

  server {
    listen 9001 ssl;
    listen [::]:9001 ssl;
    ssl_certificate /etc/serving-cert/tls.crt;
    ssl_certificate_key /etc/serving-cert/tls.key;
    root /usr/share/nginx/html;

    # OpenShift Console fetches plugin-manifest.json (auto-generated by
    # ConsoleRemotePlugin during build) and the bundle JS/CSS chunks.
    location / {
      add_header 'Cache-Control' 'no-cache' always;
      autoindex on;
    }
  }
}
