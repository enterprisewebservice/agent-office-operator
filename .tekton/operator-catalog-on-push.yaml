apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: agent-office-operator-catalog-on-push
  namespace: default-tenant
  annotations:
    pipelinesascode.tekton.dev/on-cel-expression: 'event == "push" && target_branch == "main" && body.head_commit.author.email != "noreply@argoproj.io"'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
    build.appstudio.openshift.io/repo: 'https://github.com/enterprisewebservice/agent-office-operator?rev={{revision}}'
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
  labels:
    appstudio.openshift.io/application: agent-office-operator
    appstudio.openshift.io/component: operator-catalog
    pipelines.appstudio.openshift.io/type: build
spec:
  params:
    - name: git-url
      value: '{{source_url}}'
    - name: revision
      value: '{{revision}}'
    - name: output-image
      # Stable tag. OLM's registryPoll picks up digest changes within 5
      # minutes; no Image Updater needed.
      value: 'quay-quay-quay-test.apps.salamander.aimlworkbench.com/deanpeterson/agent-office-operator-catalog:v1.7.3'
    # File-Based Catalog index image. The catalog/ dir contains the
    # declarative-config YAML that opm serves to OLM.
    - name: dockerfile
      value: catalog.Dockerfile
    - name: path-context
      value: .
    - name: rebuild
      value: "true"
    - name: skip-checks
      value: "true"
  pipelineRef:
    resolver: bundles
    params:
      - name: bundle
        value: 'quay.io/konflux-ci/tekton-catalog/pipeline-docker-build@sha256:1b2a544f5308a50b8ebf76e76f10f8be3e12342d6ce7233d2520aca724294a82'
      - name: name
        value: docker-build
      - name: kind
        value: pipeline
  # Exclude build node ec-0d-9a-89-19-46 — its overlayfs has a
  # userxattr/metacopy=on misconfig that intermittently corrupts
  # buildah layer commits. Remove when the node is fixed. See
  # autoresearch-trainer-on-push.yaml for the diagnosis.
  taskRunTemplate:
    podTemplate:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - ec-0d-9a-89-19-46
  taskRunSpecs:
    - pipelineTaskName: build-container
      stepSpecs:
        - name: build
          computeResources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
  workspaces:
    - name: workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
    - name: git-auth
      secret:
        secretName: '{{ git_auth_secret }}'
