apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: autoresearch-trainer-on-push
  namespace: default-tenant
  annotations:
    # PaC trigger — only on push to main when the trainer dockerfile or
    # its tekton file changed. The path-changes filter keeps unrelated
    # commits (operator code, bundle YAMLs) from rebuilding this image
    # for no reason — saves ~5 min per such commit.
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "push"
      && target_branch == "main"
      && body.head_commit.author.email != "noreply@argoproj.io"
      && (
           "Containerfile.autoresearch-trainer".pathChanged()
           || ".tekton/autoresearch-trainer-on-push.yaml".pathChanged()
         )
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
    build.appstudio.openshift.io/repo: 'https://github.com/enterprisewebservice/agent-office-operator?rev={{revision}}'
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
  labels:
    appstudio.openshift.io/application: agent-office-operator
    appstudio.openshift.io/component: autoresearch-trainer
    pipelines.appstudio.openshift.io/type: build
spec:
  params:
    - name: git-url
      value: '{{source_url}}'
    - name: revision
      value: '{{revision}}'
    - name: output-image
      # Stable v0.0.1 tag. Bump when the Containerfile's dependency
      # pins change in a way kfp pipeline steps need to pick up
      # (e.g. major training-hub bump). AutoResearchProject CRs
      # reference this tag explicitly in spec.trainer.image so they
      # don't get surprised by ":latest" drift.
      value: 'quay-quay-quay-test.apps.salamander.aimlworkbench.com/deanpeterson/autoresearch-trainer:v0.0.7'
    - name: dockerfile
      value: Containerfile.autoresearch-trainer
    - name: path-context
      value: .
    - name: rebuild
      value: "true"
    - name: skip-checks
      value: "true"
  pipelineRef:
    resolver: bundles
    params:
      - name: bundle
        value: 'quay.io/konflux-ci/tekton-catalog/pipeline-docker-build@sha256:1b2a544f5308a50b8ebf76e76f10f8be3e12342d6ce7233d2520aca724294a82'
      - name: name
        value: docker-build
      - name: kind
        value: pipeline
  # Exclude node ec-0d-9a-89-19-46 from build scheduling.
  # That node's overlayfs has a userxattr / metacopy=on misconfig
  # (logged in dmesg dozens of times; healthy nodes have zero of
  # these messages) which intermittently corrupts xattr round-trip
  # during buildah layer commit / push. Symptoms we saw on it:
  #   brpgl, hpg4h: "Digest did not match" during LABEL commit
  #   cw258:        "file integrity checksum failed" during push
  # The one build that succeeded (bs2vh) landed on a different
  # node. Resource limits weren't the cause; node-local storage
  # correctness was. Other workloads can still run on the bad
  # node — only Konflux builds (which exercise overlayfs heavily)
  # need to avoid it. Remove this block once the node is fixed.
  taskRunTemplate:
    podTemplate:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - ec-0d-9a-89-19-46
  taskRunSpecs:
    - pipelineTaskName: build-container
      stepSpecs:
        - name: build
          # Bigger image (PyTorch + CUDA layers are ~4 GB), pip install
          # of training-hub + deps is CPU-bound. Same 16-core ceiling
          # the operator build uses; trainer build typically finishes
          # in 6-8 minutes cold. Memory bumped 12 → 24 GiB earlier as
          # a guess at the COMMIT-step failures — turned out the real
          # cause was the broken node above (see taskRunTemplate
          # affinity). Leaving the bump in place: doesn't hurt and
          # large multi-layer commits do benefit from headroom.
          computeResources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "16"
              memory: 24Gi
  workspaces:
    - name: workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              # Bumped from 10 → 50 Gi after v0.0.6 builds repeatedly
              # failed at the COMMIT step. The image is ~8 GB; buildah
              # needs space for: decompressed base (~6 GB) + pip cache
              # (~2 GB) + intermediate layer storage during commit
              # (full image again, ~8 GB) + git checkout. With only
              # 10 Gi, the COMMIT step was running on a near-full
              # filesystem and randomly corrupting layer writes.
              storage: 50Gi
    - name: git-auth
      secret:
        secretName: '{{ git_auth_secret }}'
