apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: agent-office-operator-image-on-push
  namespace: default-tenant
  annotations:
    # PaC trigger — only on push to main. Skip pushes from
    # argocd-image-updater so its bump-commits don't loop the pipeline.
    pipelinesascode.tekton.dev/on-cel-expression: 'event == "push" && target_branch == "main" && body.head_commit.author.email != "noreply@argoproj.io"'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "5"
    build.appstudio.openshift.io/repo: 'https://github.com/enterprisewebservice/agent-office-operator?rev={{revision}}'
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
  labels:
    appstudio.openshift.io/application: agent-office-operator
    appstudio.openshift.io/component: operator-controller
    pipelines.appstudio.openshift.io/type: build
spec:
  params:
    - name: git-url
      value: '{{source_url}}'
    - name: revision
      value: '{{revision}}'
    - name: output-image
      # Stable tag matching the bundle version. OLM's registryPoll (in
      # the CatalogSource) detects digest changes behind this tag, so we
      # don't need ArgoCD Image Updater for the operator chain. Multiple
      # tags can be added later via Konflux's release pipeline.
      value: 'quay-quay-quay-test.apps.salamander.aimlworkbench.com/deanpeterson/agent-office-operator:v0.0.53'
    - name: dockerfile
      value: Dockerfile
    - name: path-context
      value: .
    - name: rebuild
      value: "true"
    - name: skip-checks
      value: "true"
  pipelineRef:
    resolver: bundles
    params:
      - name: bundle
        value: 'quay.io/konflux-ci/tekton-catalog/pipeline-docker-build@sha256:1b2a544f5308a50b8ebf76e76f10f8be3e12342d6ce7233d2520aca724294a82'
      - name: name
        value: docker-build
      - name: kind
        value: pipeline
  # Exclude build node ec-0d-9a-89-19-46 — its overlayfs has a
  # userxattr/metacopy=on misconfig that intermittently corrupts
  # buildah layer commits. Remove when the node is fixed. See
  # autoresearch-trainer-on-push.yaml for the diagnosis.
  taskRunTemplate:
    podTemplate:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - ec-0d-9a-89-19-46
  taskRunSpecs:
    - pipelineTaskName: build-container
      stepSpecs:
        - name: build
          # Bumped from 4→16 CPU. The Konflux pipeline forces buildah
          # `--no-cache` for SLSA-3 reproducibility, so every push is a
          # cold rebuild of the full k8s.io dep tree. The build node has
          # tons of headroom (10% CPU / 29% memory utilized), so the
          # bottleneck was purely the per-step CPU limit. Compilation
          # parallelism scales near-linearly until ~16 cores for our
          # graph.
          computeResources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "16"
              memory: 8Gi
  workspaces:
    - name: workspace
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
    - name: git-auth
      secret:
        secretName: '{{ git_auth_secret }}'
