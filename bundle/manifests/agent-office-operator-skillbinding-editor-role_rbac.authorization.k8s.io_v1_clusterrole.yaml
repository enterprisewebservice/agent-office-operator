# Editor role for SkillBinding: read + edit.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agent-office-operator
    app.kubernetes.io/managed-by: kustomize
  name: agent-office-operator-skillbinding-editor-role
rules:
- apiGroups:
  - agentoffice.ai
  resources:
  - skillbindings
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agentoffice.ai
  resources:
  - skillbindings/status
  verbs:
  - get
