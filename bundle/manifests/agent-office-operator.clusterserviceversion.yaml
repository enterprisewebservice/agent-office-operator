    url: https://github.com/enterprisewebservice/agent-office-memory-modules
  - name: Agent Office UI
    url: https://github.com/enterprisewebservice/agent-office
  maintainers:
  - email: deanpeterson@redhat.com
    name: Dean Peterson
  maturity: alpha
  provider:
    name: Red Hat Solution Architecture
    url: https://github.com/enterprisewebservice
  version: 0.0.1
