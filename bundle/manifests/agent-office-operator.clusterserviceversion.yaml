apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "agentoffice.ai/v1alpha1",
          "kind": "AgentGateway",
          "metadata": {
            "name": "research-gateway",
            "namespace": "agent-office"
          },
          "spec": {
            "description": "Shared OpenClaw gateway runtime for the Karpathy auto-research crew.\nMultiple AgentWorkstations with `runtime.shared.gatewayRef:\nresearch-gateway` slot in as logical openclaw agents inside this\npod, sharing the paired browser node-host VM via a per-agent\nChromium profile.\n",
            "displayName": "Research Gateway",
            "image": "quay-quay-quay-test.apps.salamander.aimlworkbench.com/deanpeterson/openclaw:latest",
            "nodeHostRef": {
              "name": "fedora-black-zebra-36",
              "namespace": "default"
            }
          }
        },
        {
          "apiVersion": "agentoffice.ai/v1alpha1",
          "kind": "AgentWorkstation",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "agent-office-operator"
            },
            "name": "agentworkstation-sample"
          },
          "spec": null
        },
        {
          "apiVersion": "agentoffice.ai/v1alpha1",
          "kind": "MemoryModule",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "agent-office-operator"
            },
            "name": "memorymodule-sample"
          },
          "spec": null
        }
      ]
    capabilities: Basic Install
    categories: AI/Machine Learning, Developer Tools
    containerImage: quay-quay-quay-test.apps.salamander.aimlworkbench.com/deanpeterson/agent-office-operator:v0.0.1
    createdAt: "2026-05-27T04:41:09Z"
    description: OLM-managed operator for the Governed Agent Platform. Owns the AgentWorkstation
      and MemoryModule CRDs and reconciles the per-agent runtime artifacts (Deployment,
      Service, ConfigMap, PVC) on OpenShift.
    operators.operatorframework.io/builder: operator-sdk-v1.42.2
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/enterprisewebservice/agent-office-operator
    support: Red Hat Solution Architecture
  name: agent-office-operator.v1.4.1
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: |-
        AgentGateway is a single OpenClaw gateway runtime that hosts one or
        more AgentWorkstations as logical openclaw agents. Multiple AWs
        with `spec.runtime.shared.gatewayRef: <this>` share this gateway's
        pod, paired node-host, and browser profiles. Per OpenClaw's
        doc'd multi-agent model.
      displayName: Agent Gateway
      kind: AgentGateway
      name: agentgateways.agentoffice.ai
      version: v1alpha1
    - description: |-
        AgentWorkstation is a single governed coding-agent instance — the cluster
        representation of "one seat in the office". The operator owns its
        Deployment, Service, ConfigMap, PVC, and Secret references.
      displayName: Agent Workstation
      kind: AgentWorkstation
      name: agentworkstations.agentoffice.ai
      version: v1alpha1
    - description: |-
        AutoResearchProject is a Karpathy-style autonomous QLoRA
        fine-tuning loop. The operator owns its DSP pipeline, MLMD
        experiment, scheduled rounds, and the agent that proposes new
        training configs based on prior round eval results.
      displayName: Auto Research Project
      kind: AutoResearchProject
      name: autoresearchprojects.agentoffice.ai
      version: v1alpha1
    - description: |-
        KnowledgeBase is the cluster-side representation of a research
        agent's curated wiki. The operator bootstraps a paired git repo,
        syncs it via a sidecar, and exposes the resulting Markdown tree
        to Obsidian or any other vault-aware reader.
      displayName: Knowledge Base
      kind: KnowledgeBase
      name: knowledgebases.agentoffice.ai
      version: v1alpha1
    - description: |-
        MemoryModule is shared .md content that one or more AgentWorkstations
        pull into their per-agent rendered ConfigMap (AGENTS.md, USER.md,
        SKILL_<name>.md, etc.). Single source of truth for cross-agent memory.
      displayName: Memory Module
      kind: MemoryModule
      name: memorymodules.agentoffice.ai
      version: v1alpha1
    - description: |-
        SkillBinding attaches one or more Skill resources to an
        AgentWorkstation, rendering SKILL_<name>.md into that agent's
        per-agent ConfigMap. The binding tracks the source-of-truth hash
        so updates to a Skill propagate to every bound workstation.
      displayName: Skill Binding
      kind: SkillBinding
      name: skillbindings.agentoffice.ai
      version: v1alpha1
    - description: |-
        Skill is shared SKILL_<name>.md content that AgentWorkstations can
        bind via SkillBinding. Same library/per-agent split as MemoryModule
        but scoped to Anthropic Skills Open Standard content.
      displayName: Skill
      kind: Skill
      name: skills.agentoffice.ai
      version: v1alpha1
  description: |
    The Agent Office Operator manages governed coding agents on OpenShift.

    It owns two CRDs in the `agentoffice.ai` API group:

    - **AgentWorkstation** — one governed coding-agent instance. The
      operator reconciles its Deployment, Service, ConfigMap, PVC, and
      Secret references.
    - **MemoryModule** — shared `.md` content (AGENTS.md, USER.md,
      SKILL_*.md) referenced by one or more AgentWorkstations. The
      operator computes a content hash and a referenced-by index so the
      UI can show which agents share which memory.

    The operator follows the AAIF (Agentic AI Foundation, Linux Foundation,
    December 2025) cross-tool conventions for `AGENTS.md` and the Anthropic
    Skills Open Standard for `SKILL_<name>.md` packaging.

    The OpenShift Console gets a ConsolePlugin that adds Memory Module and
    Agent Workstation tabs to the operator's CSV detail page.
  displayName: Agent Office Operator
  icon:
  - base64data: 
    mediatype: image/png
