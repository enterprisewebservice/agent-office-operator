apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "agentoffice.ai/v1alpha1",
          "kind": "AgentWorkstation",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "agent-office-operator"
            },
            "name": "agentworkstation-sample"
          },
          "spec": null
        },
        {
          "apiVersion": "agentoffice.ai/v1alpha1",
          "kind": "MemoryModule",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "agent-office-operator"
            },
            "name": "memorymodule-sample"
          },
          "spec": null
        }
      ]
    capabilities: Basic Install
    categories: AI/Machine Learning, Developer Tools
    containerImage: quay-quay-quay-test.apps.salamander.aimlworkbench.com/deanpeterson/agent-office-operator:v0.0.1
    createdAt: "2026-05-02T05:09:51Z"
    description: OLM-managed operator for the Governed Agent Platform. Owns the AgentWorkstation
      and MemoryModule CRDs and reconciles the per-agent runtime artifacts (Deployment,
      Service, ConfigMap, PVC) on OpenShift.
    operators.operatorframework.io/builder: operator-sdk-v1.42.2
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    repository: https://github.com/enterprisewebservice/agent-office-operator
    support: Red Hat Solution Architecture
  name: agent-office-operator.v0.0.1
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: |-
        AgentWorkstation is a single governed coding-agent instance — the cluster
        representation of "one seat in the office". The operator owns its
        Deployment, Service, ConfigMap, PVC, and Secret references.
      displayName: Agent Workstation
      kind: AgentWorkstation
      name: agentworkstations.agentoffice.ai
      version: v1alpha1
    - description: |-
        MemoryModule is shared .md content that one or more AgentWorkstations
        pull into their per-agent rendered ConfigMap (AGENTS.md, USER.md,
        SKILL_<name>.md, etc.). Single source of truth for cross-agent memory.
      displayName: Memory Module
      kind: MemoryModule
      name: memorymodules.agentoffice.ai
      version: v1alpha1
  description: |
    The Agent Office Operator manages governed coding agents on OpenShift.

    It owns two CRDs in the `agentoffice.ai` API group:

    - **AgentWorkstation** — one governed coding-agent instance. The
      operator reconciles its Deployment, Service, ConfigMap, PVC, and
      Secret references.
    - **MemoryModule** — shared `.md` content (AGENTS.md, USER.md,
      SKILL_*.md) referenced by one or more AgentWorkstations. The
      operator computes a content hash and a referenced-by index so the
      UI can show which agents share which memory.

    The operator follows the AAIF (Agentic AI Foundation, Linux Foundation,
    December 2025) cross-tool conventions for `AGENTS.md` and the Anthropic
    Skills Open Standard for `SKILL_<name>.md` packaging.

    The OpenShift Console gets a ConsolePlugin that adds Memory Module and
    Agent Workstation tabs to the operator's CSV detail page.
  displayName: Agent Office Operator
  icon:
  - base64data: ""
    mediatype: ""
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
        - apiGroups:
          - agentoffice.ai
          resources:
          - agentworkstations
          - memorymodules
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - agentoffice.ai
          resources:
          - agentworkstations/finalizers
          - memorymodules/finalizers
          verbs:
          - update
        - apiGroups:
          - agentoffice.ai
          resources:
          - agentworkstations/status
          - memorymodules/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - authentication.k8s.io
          resources:
          - tokenreviews
          verbs:
          - create
        - apiGroups:
          - authorization.k8s.io
          resources:
          - subjectaccessreviews
          verbs:
          - create
        serviceAccountName: agent-office-operator-controller-manager
      deployments:
      - label:
          app.kubernetes.io/managed-by: kustomize
          app.kubernetes.io/name: agent-office-operator
          control-plane: controller-manager
        name: agent-office-operator-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: agent-office-operator
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                app.kubernetes.io/name: agent-office-operator
                control-plane: controller-manager
            spec:
              containers:
              - args:
                - --metrics-bind-address=:8443
                - --leader-elect
                - --health-probe-bind-address=:8081
                command:
                - /manager
                env:
                - name: WATCH_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['olm.targetNamespaces']
                image: quay-quay-quay-test.apps.salamander.aimlworkbench.com/deanpeterson/agent-office-operator:v0.0.1
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 128Mi
                  requests:
                    cpu: 10m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              imagePullSecrets:
              - name: quay-pull-secret
              securityContext:
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              serviceAccountName: agent-office-operator-controller-manager
              terminationGracePeriodSeconds: 10
      permissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - get
          - list
          - watch
          - create
          - update
          - patch
          - delete
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        serviceAccountName: agent-office-operator-controller-manager
    strategy: deployment
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - agent
  - ai
  - openclaw
  - aaif
  - llm
