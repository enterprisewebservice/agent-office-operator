# Viewer role for SkillBinding: read-only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agent-office-operator
    app.kubernetes.io/managed-by: kustomize
  name: skillbinding-viewer-role
rules:
- apiGroups:
  - agentoffice.ai
  resources:
  - skillbindings
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agentoffice.ai
  resources:
  - skillbindings/status
  verbs:
  - get
