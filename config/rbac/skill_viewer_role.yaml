# Viewer role for Skill: read-only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agent-office-operator
    app.kubernetes.io/managed-by: kustomize
  name: skill-viewer-role
rules:
- apiGroups:
  - agentoffice.ai
  resources:
  - skills
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agentoffice.ai
  resources:
  - skills/status
  verbs:
  - get
