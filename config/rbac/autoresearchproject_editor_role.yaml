apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agent-office-operator
    app.kubernetes.io/managed-by: kustomize
  name: autoresearchproject-editor-role
rules:
- apiGroups: [agentoffice.ai]
  resources: [autoresearchprojects]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [agentoffice.ai]
  resources: [autoresearchprojects/status]
  verbs: [get]
