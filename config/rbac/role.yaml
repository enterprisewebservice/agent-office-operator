---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agentoffice.ai
  resources:
  - agentworkstations
  - memorymodules
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agentoffice.ai
  resources:
  - agentworkstations/finalizers
  - memorymodules/finalizers
  verbs:
  - update
- apiGroups:
  - agentoffice.ai
  resources:
  - agentworkstations/status
  - memorymodules/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - route.openshift.io
  resources:
  - routes
  verbs:
  - get
  - list
  - watch
