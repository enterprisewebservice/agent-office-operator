---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods/exec
  verbs:
  - create
- apiGroups:
  - agentoffice.ai
  resources:
  - agentgateways
  - agentworkstations
  - memorymodules
  - skillbindings
  - skills
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agentoffice.ai
  resources:
  - agentgateways/finalizers
  - agentworkstations/finalizers
  - memorymodules/finalizers
  - skillbindings/finalizers
  - skills/finalizers
  verbs:
  - update
- apiGroups:
  - agentoffice.ai
  resources:
  - agentgateways/status
  - agentworkstations/status
  - memorymodules/status
  - skillbindings/status
  - skills/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - route.openshift.io
  resources:
  - routes
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
