# Viewer role for KnowledgeBase resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agent-office-operator
    app.kubernetes.io/managed-by: kustomize
  name: knowledgebase-viewer-role
rules:
- apiGroups:
  - agentoffice.ai
  resources:
  - knowledgebases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agentoffice.ai
  resources:
  - knowledgebases/status
  verbs:
  - get
