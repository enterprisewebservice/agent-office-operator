# This rule is not used by the project agent-office-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over SkillBinding resources in agentoffice.ai.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agent-office-operator
    app.kubernetes.io/managed-by: kustomize
  name: skillbinding-admin-role
rules:
- apiGroups:
  - agentoffice.ai
  resources:
  - skillbindings
  verbs:
  - '*'
- apiGroups:
  - agentoffice.ai
  resources:
  - skillbindings/status
  verbs:
  - get
