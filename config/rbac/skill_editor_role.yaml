# Editor role for Skill: read + edit but not full ownership.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agent-office-operator
    app.kubernetes.io/managed-by: kustomize
  name: skill-editor-role
rules:
- apiGroups:
  - agentoffice.ai
  resources:
  - skills
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agentoffice.ai
  resources:
  - skills/status
  verbs:
  - get
