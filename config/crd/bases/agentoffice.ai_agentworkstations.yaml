---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: agentworkstations.agentoffice.ai
spec:
  group: agentoffice.ai
  names:
    categories:
    - agent-office
    kind: AgentWorkstation
    listKind: AgentWorkstationList
    plural: agentworkstations
    shortNames:
    - aw
    singular: agentworkstation
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.displayName
      name: Display Name
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.model.provider
      name: Provider
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentWorkstation is a single governed coding-agent instance — the cluster
          representation of "one seat in the office". The operator owns its
          Deployment, Service, ConfigMap, PVC, and Secret references.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentWorkstationSpec defines the desired state of an AgentWorkstation.
            properties:
              apiKeySecretRef:
                description: |-
                  APIKeySecretRef is the name of a Secret containing the API key
                  (key "api-key").
                type: string
              channels:
                description: Channels configures the channels the agent communicates
                  on.
                properties:
                  discord:
                    description: |-
                      DiscordChannelSpec configures the Discord channel/server the agent
                      posts to. The URL field is the link the Console card's "Open in
                      Discord" button uses — Discord channel URL
                      (`https://discord.com/channels/<guild>/<channel>`), invite link
                      (`https://discord.gg/<code>`), or guild URL all work.
                    properties:
                      url:
                        description: URL the "Open in Discord" Console button opens.
                        type: string
                    type: object
                type: object
              description:
                description: Description is a brief description of the agent's purpose.
                type: string
              displayName:
                description: DisplayName is the human-readable name for this agent
                  workstation.
                type: string
              emoji:
                description: Emoji icon for the agent in the office view.
                type: string
              image:
                default: quay.io/aicatalyst/openclaw:latest
                description: Image is the container image for the agent runtime.
                type: string
              memory:
                description: Memory lists shared MemoryModule references and per-agent
                  overrides.
                properties:
                  modules:
                    description: |-
                      Modules referenced by this agent. The operator renders the union of
                      the modules' content into the agent's per-agent ConfigMap, ordered
                      by kind (AAIF cascade: agents -> user -> tools -> skill).
                    items:
                      description: |-
                        MemoryModuleRef is a reference to a MemoryModule CR consumed by this
                        agent. Resolved by the operator at render time.
                      properties:
                        name:
                          description: |-
                            Name of the MemoryModule (cluster-namespaced; same namespace as the
                            AgentWorkstation).
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  overrides:
                    additionalProperties:
                      type: string
                    description: |-
                      Overrides is inline .md content that takes precedence over any
                      referenced module's content for the same kind/filename. Useful for
                      agent-specific tweaks without forking a shared module.
                    type: object
                type: object
              model:
                description: Model selects the LLM backend.
                properties:
                  modelName:
                    default: auto
                    description: ModelName is the specific model name, or "auto" for
                      router-selected.
                    type: string
                  modelRouterRef:
                    description: |-
                      ModelRouterRef references a SmallModelRouter CR (used when provider
                      is smr).
                    type: string
                  provider:
                    description: Provider type.
                    enum:
                    - smr
                    - anthropic
                    - openai
                    - custom
                    type: string
                required:
                - provider
                type: object
              office:
                description: Office carries UI-only metadata for the office Map view.
                properties:
                  position:
                    description: OfficePosition is the (x,y) seat layout in the office
                      Map view.
                    properties:
                      x:
                        format: int32
                        type: integer
                      "y":
                        format: int32
                        type: integer
                    type: object
                type: object
              resources:
                description: Resources are the container resource requests/limits.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This is an alpha field and requires enabling the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              runtime:
                description: |-
                  Runtime selects how the operator materializes this agent. If
                  omitted, defaults to `dedicated` (slice-4 model: own Pod and
                  dependent K8s objects). Set `runtime.shared.gatewayRef` to
                  slot the agent into an existing AgentGateway as a logical
                  openclaw agent (multi-agent-in-one-pod model).
                properties:
                  dedicated:
                    description: 'Dedicated runtime: own Pod, own PVC, own Service,
                      own Route.'
                    type: object
                  shared:
                    description: |-
                      Shared runtime: logical openclaw agent inside the referenced
                      AgentGateway's pod, sharing the gateway's paired node-host
                      browser via a per-agent profile.
                    properties:
                      browserProfile:
                        description: |-
                          BrowserProfile is the Chromium profile / user-data-dir name
                          to use for this agent on the shared node-host. Defaults to the
                          AW's own name if omitted.
                        type: string
                      gatewayRef:
                        description: |-
                          GatewayRef is the name of the AgentGateway in the same
                          namespace that hosts this agent.
                        type: string
                    required:
                    - gatewayRef
                    type: object
                type: object
              systemPrompt:
                description: SystemPrompt defines the agent's behavior.
                type: string
              tools:
                description: Tools is the tool allowlist.
                properties:
                  allow:
                    description: Allow is the list of tool names the agent is allowed
                      to use.
                    items:
                      type: string
                    type: array
                type: object
            required:
            - displayName
            - model
            - systemPrompt
            type: object
          status:
            description: AgentWorkstationStatus reflects observed state.
            properties:
              conditions:
                description: |-
                  Conditions reflect the latest available observations of the agent's
                  state. Standard types: Ready, Available, Progressing.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              gatewayEndpoint:
                description: GatewayEndpoint is the public URL the agent listens on.
                type: string
              lastActivity:
                description: LastActivity records the last time the agent processed
                  a request.
                format: date-time
                type: string
              message:
                description: Message is a human-readable detail accompanying Phase.
                type: string
              phase:
                description: AgentWorkstationPhase is the high-level lifecycle phase
                  the agent is in.
                enum:
                - Pending
                - Creating
                - Running
                - Stopped
                - Error
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
